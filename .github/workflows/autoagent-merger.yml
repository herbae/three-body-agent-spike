name: '[AUTOAGENT] Merger'

on:
  # schedule:
  #   - cron: '0 2-22/2 * * *'  # Every 2 hours (skip 23:00-01:00 UTC)
  workflow_dispatch:

concurrency:
  group: autoagent-merger
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: read
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.scan.outputs.skip }}
      pr_list: ${{ steps.scan.outputs.pr_list }}
      start_message: ${{ steps.msg.outputs.start_message }}

    steps:
      - name: Checkout .github
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: false

      - name: Load autoagent config
        uses: ./.github/actions/autoagent-setup

      - name: Scan for merge-ready PRs
        id: scan
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
        run: |
          set -e
          echo "=== Scanning for merge-ready autoagent PRs ==="

          PRS=$(gh pr list --repo "${{ github.repository }}" --state open \
            --json number,headRefName,mergeable,title \
            --jq ".[] | select(.headRefName | startswith(\"${AUTOAGENT_BRANCH_PREFIX}\"))" 2>/dev/null || echo "")

          if [ -z "$PRS" ]; then
            echo "No open autoagent PRs found."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$PRS" | jq -c '.' | sort -t'"' -k4 -n | while read -r PR; do
            NUM=$(echo "$PR" | jq -r '.number')
            TITLE=$(echo "$PR" | jq -r '.title')
            MERGEABLE=$(echo "$PR" | jq -r '.mergeable')

            echo "--- PR #${NUM}: ${TITLE} ---"

            # Check mergeable status
            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "  Conflicts. Skipping."
              continue
            fi

            # Check all CI checks passed
            CHECKS=$(gh pr checks "$NUM" --repo "${{ github.repository }}" --json state 2>/dev/null || echo "[]")
            TOTAL=$(echo "$CHECKS" | jq 'length')
            if [ "$TOTAL" -eq 0 ]; then
              echo "  No checks reported yet. Skipping."
              continue
            fi

            NOT_PASSED=$(echo "$CHECKS" | jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length')
            if [ "$NOT_PASSED" -gt 0 ]; then
              echo "  ${NOT_PASSED} checks not passed. Skipping."
              continue
            fi

            # Check no CHANGES_REQUESTED reviews
            CHANGES_REQUESTED=$(gh api "/repos/${{ github.repository }}/pulls/${NUM}/reviews" \
              --jq '[.[] | select(.state == "CHANGES_REQUESTED")] | length' 2>/dev/null || echo "0")
            if [ "$CHANGES_REQUESTED" -gt 0 ]; then
              echo "  Has changes requested. Skipping."
              continue
            fi

            # Check no blocking severity issues in review comments
            REVIEW_ISSUES=$(gh api "/repos/${{ github.repository }}/pulls/${NUM}/comments" \
              --jq "[.[] | select(.body | test(\"${AUTOAGENT_SEVERITY_REGEX}\"))] | length" 2>/dev/null || echo "0")
            if [ "$REVIEW_ISSUES" -gt 0 ]; then
              echo "  Has unresolved blocking severity issues in review comments. Skipping."
              continue
            fi

            echo "  Ready to merge!"
            echo "${NUM}|${TITLE}" >> /tmp/merger-ready-prs.txt

          done

          if [ ! -f /tmp/merger-ready-prs.txt ]; then
            echo "No merge-ready PRs found."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          READY_COUNT=$(wc -l < /tmp/merger-ready-prs.txt | tr -d ' ')
          echo "Found ${READY_COUNT} merge-ready PR(s)"

          # Pass PR list as base64 to preserve newlines.
          # -w 0 disables base64's default 76-char line wrap: without it, long PR
          # titles produce multi-line output that breaks GITHUB_OUTPUT's key=value
          # parsing (only the first line is picked up, truncating the value).
          PR_LIST=$(base64 -w 0 /tmp/merger-ready-prs.txt)
          echo "pr_list=$PR_LIST" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          rm -f /tmp/merger-ready-prs.txt

      - name: Build start message
        id: msg
        if: steps.scan.outputs.skip != 'true'
        env:
          PR_LIST_B64: ${{ steps.scan.outputs.pr_list }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_LIST=$(echo "$PR_LIST_B64" | base64 -d)
          PR_SUMMARY=$(echo "$PR_LIST" | while IFS='|' read -r NUM TITLE; do echo "• #${NUM}  - ${TITLE}"; done)
          {
            echo 'start_message<<EOF'
            echo "[AUTOAGENT] Merger  - merging PRs:"
            echo "$PR_SUMMARY"
            echo "${RUN_URL}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  notify-start:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    uses: ./.github/workflows/notify.yml
    with:
      message: ${{ needs.prepare.outputs.start_message }}
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  merge:
    needs: prepare
    if: needs.prepare.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 15
    outputs:
      after_message: ${{ steps.summary.outputs.after_message }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: false
          token: ${{ secrets.AGENT_PAT }}

      - name: Load autoagent config
        uses: ./.github/actions/autoagent-setup

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Merge PRs sequentially
        id: do-merge
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_LIST_B64: ${{ needs.prepare.outputs.pr_list }}
        run: |
          set -e

          echo "$PR_LIST_B64" | base64 -d > /tmp/merger-prs.txt

          while IFS='|' read -r PR_NUM PR_TITLE; do
            echo "=== Merging PR #${PR_NUM}: ${PR_TITLE} ==="

            # Re-verify mergeable status (may have changed after prior merge)
            MERGEABLE=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json mergeable -q '.mergeable')
            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "  Conflict detected (likely from prior merge). Skipping."
              echo "skip|#${PR_NUM}|${PR_TITLE}|conflict after prior merge" >> /tmp/merger-results.txt
              continue
            fi

            # Re-verify checks still pass
            NOT_PASSED=$(gh pr checks "$PR_NUM" --repo "${{ github.repository }}" --json state \
              --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length' 2>/dev/null || echo "1")
            if [ "$NOT_PASSED" -gt 0 ]; then
              echo "  Checks no longer passing. Skipping."
              echo "skip|#${PR_NUM}|${PR_TITLE}|checks failing" >> /tmp/merger-results.txt
              continue
            fi

            # Re-verify no CHANGES_REQUESTED reviews
            CHANGES_REQUESTED=$(gh api "/repos/${{ github.repository }}/pulls/${PR_NUM}/reviews" \
              --jq '[.[] | select(.state == "CHANGES_REQUESTED")] | length' 2>/dev/null || echo "0")
            if [ "$CHANGES_REQUESTED" -gt 0 ]; then
              echo "  Changes requested since scan. Skipping."
              echo "skip|#${PR_NUM}|${PR_TITLE}|changes requested" >> /tmp/merger-results.txt
              continue
            fi

            # Claude merge analysis: check if review issues were addressed
            REVIEW_COMMENTS=$(gh api "/repos/${{ github.repository }}/pulls/${PR_NUM}/comments" \
              --jq '.[] | "[\(.path):\(.line // .original_line)] \(.body)"' 2>/dev/null || echo "")
            REVIEW_VERDICTS=$(gh api "/repos/${{ github.repository }}/pulls/${PR_NUM}/reviews" \
              --jq '.[] | "[\(.state)] \(.user.login): \(.body)"' 2>/dev/null || echo "")

            if [ -n "$REVIEW_COMMENTS" ] || [ -n "$REVIEW_VERDICTS" ]; then
              RECENT_COMMITS=$(gh api "/repos/${{ github.repository }}/pulls/${PR_NUM}/commits" \
                --jq '.[-10:] | .[].commit.message' 2>/dev/null || echo "")

              DECISION=$(export PR_NUM REVIEW_COMMENTS REVIEW_VERDICTS RECENT_COMMITS; \
                envsubst '$PR_NUM $REVIEW_COMMENTS $REVIEW_VERDICTS $RECENT_COMMITS' < .github/prompts/merger.md | \
                claude -p --model "$AUTOAGENT_MERGER_MODEL" --max-turns 1 --output-format text \
                2>/dev/null || echo "MERGE
          Claude unavailable, defaulting to merge")

              VERDICT=$(echo "$DECISION" | head -1 | tr -d '[:space:]')
              REASON=$(echo "$DECISION" | sed -n '2p')

              if [ "$VERDICT" = "SKIP" ]; then
                echo "  Claude: ${REASON}"
                echo "skip|#${PR_NUM}|${PR_TITLE}|claude: ${REASON}" >> /tmp/merger-results.txt
                continue
              fi
              echo "  Claude: ${REASON}"
            fi

            # Merge using configured method
            if gh pr merge "$PR_NUM" --repo "${{ github.repository }}" "--${AUTOAGENT_MERGER_METHOD}" 2>&1; then
              echo "  Merged!"
              echo "merged|#${PR_NUM}|${PR_TITLE}" >> /tmp/merger-results.txt
            else
              echo "  Merge failed."
              echo "failed|#${PR_NUM}|${PR_TITLE}" >> /tmp/merger-results.txt
            fi

            # Brief pause for GitHub to process before next PR
            sleep "$AUTOAGENT_MERGER_PAUSE"

          done < /tmp/merger-prs.txt

          rm -f /tmp/merger-prs.txt

      - name: Build summary
        id: summary
        if: always()
        run: |
          MERGED=""
          SKIPPED=""
          FAILED=""

          if [ -f /tmp/merger-results.txt ]; then
            MERGED=$(grep '^merged|' /tmp/merger-results.txt | sed 's/^merged|/ /' | sed 's/|/  - /' || true)
            SKIPPED=$(grep '^skip|' /tmp/merger-results.txt | sed 's/^skip|/ /' | sed 's/|/  - /g' || true)
            FAILED=$(grep '^failed|' /tmp/merger-results.txt | sed 's/^failed|/ /' | sed 's/|/  - /' || true)
          fi

          MERGED_COUNT=$(echo "$MERGED" | grep -c '^ ' || true)

          # Job summary
          {
            echo "## [AUTOAGENT] Merger"
            echo ""
            if [ -n "$MERGED" ]; then
              echo "### Merged (${MERGED_COUNT})"
              echo "$MERGED"
              echo ""
            fi
            if [ -n "$SKIPPED" ]; then
              echo "### Skipped"
              echo "$SKIPPED"
              echo ""
            fi
            if [ -n "$FAILED" ]; then
              echo "### Failed"
              echo "$FAILED"
              echo ""
            fi
            if [ -z "$MERGED" ] && [ -z "$SKIPPED" ] && [ -z "$FAILED" ]; then
              echo "No PRs were processed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Telegram message
          {
            echo 'after_message<<EOF'
            if [ -n "$MERGED" ]; then
              echo "[AUTOAGENT] Merger - ${MERGED_COUNT} PR(s) merged:"
              echo "$MERGED"
            else
              echo "[AUTOAGENT] Merger - No PRs were merged"
            fi
            if [ -n "$SKIPPED" ]; then
              echo ""
              echo "$SKIPPED"
            fi
            if [ -n "$FAILED" ]; then
              echo ""
              echo "$FAILED"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          rm -f /tmp/merger-results.txt

  notify-done:
    needs: merge
    if: always() && needs.merge.outputs.after_message != ''
    uses: ./.github/workflows/notify.yml
    with:
      message: ${{ needs.merge.outputs.after_message }}
    secrets:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
